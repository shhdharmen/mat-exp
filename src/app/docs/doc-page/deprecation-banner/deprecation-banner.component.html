@if (versionPrefix()) {
  <div class="deprecation-banner" role="alert" aria-live="polite">
    <mat-icon class="banner-icon" aria-hidden="true">warning</mat-icon>
    <span class="banner-message">
      You are viewing documentation for <strong>{{ versionPrefix() }}</strong
      >, which is an older version.
    </span>
    <a [routerLink]="latestPath()" class="banner-link" mat-button color="primary">
      View latest docs
      <mat-icon iconPositionEnd aria-hidden="true">arrow_forward</mat-icon>
    </a>
  </div>
}
