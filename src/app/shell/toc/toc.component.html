<nav aria-label="On this page">
  <p class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-3">
    On this page
  </p>
  <div class="relative">
    <div
      class="absolute inset-y-0 left-0 w-1 rounded-full bg-outline-variant"
      aria-hidden="true"
    ></div>
    @if (indicator(); as pos) {
      <div
        class="toc-indicator absolute left-0 w-1 rounded-full bg-primary"
        [style.transform]="'translateY(' + pos.top + 'px)'"
        [style.height.px]="pos.height"
        aria-hidden="true"
      ></div>
    }
    <ul class="space-y-1 list-none p-0 m-0 pl-3">
      @for (item of items(); track item.id) {
        <li #tocItem [style.padding-left.rem]="(item.level - 1) * 0.75">
          <a
            [routerLink]="'.'"
            [fragment]="item.id"
            (click)="onLinkClick(item.id)"
            [attr.aria-current]="activeId() === item.id ? 'location' : null"
            class="block text-sm leading-6 transition-colors"
            [class.text-primary]="activeId() === item.id"
            [class.font-medium]="activeId() === item.id"
            [class.text-on-surface-variant]="activeId() !== item.id"
            [class.hover:text-on-surface]="activeId() !== item.id"
          >
            {{ item.label }}
          </a>
        </li>
      }
    </ul>
  </div>
</nav>
