name: Bug report
description: Report something that isn't working as expected in Mat Expressive
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please search [existing issues](https://github.com/Angular-Material-Dev/mat-exp/issues) first to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Steps to reproduce the behavior. A StackBlitz/CodeSandbox link or minimal repo is the fastest path to a fix.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened instead. Include screenshots, screen recordings, or console/browser errors if applicable.

  - type: input
    id: mat-exp-version
    attributes:
      label: '`@ngm-dev/mat-exp` version'
      placeholder: e.g. 1.0.0-beta.3
    validations:
      required: true

  - type: input
    id: angular-version
    attributes:
      label: Angular version
      placeholder: e.g. 21.0.0
    validations:
      required: true

  - type: dropdown
    id: browsers
    attributes:
      label: Browser(s)
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant — OS, device, related components, etc.
