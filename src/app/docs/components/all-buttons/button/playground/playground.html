<h4 class="mat-font-title-lg">With <code>data-*</code> attributes</h4>
<section>
  <div class="example-button-row">
    <button [matButton]="appearance()" [attr.data-size]="size()" [attr.data-shape]="shape()">
      Basic
    </button>
    <button
      [matButton]="appearance()"
      [attr.data-size]="size()"
      [attr.data-shape]="shape()"
      disabled
    >
      Disabled
    </button>
    <a
      [matButton]="appearance()"
      [attr.data-size]="size()"
      [attr.data-shape]="shape()"
      href="#"
      target="_blank"
      >Link</a
    >
    <button [matButton]="appearance()" [attr.data-size]="size()" [attr.data-shape]="shape()">
      @if (iconPosition() === 'start') {
        <mat-icon>star</mat-icon>
      } @else {
        <mat-icon iconPositionEnd>star</mat-icon>
      }
      With Icon
    </button>
  </div>
</section>
<mat-divider />
<mat-divider />
<h4 class="mat-font-title-lg">With <code>matExpressiveButton</code> directive</h4>
<section>
  <div class="example-button-row">
    <button [matButton]="appearance()" [size]="size()" [shape]="shape()" matExpressiveButton>
      Basic
    </button>
    <button
      [matButton]="appearance()"
      [size]="size()"
      [shape]="shape()"
      matExpressiveButton
      disabled
    >
      Disabled
    </button>
    <a
      [matButton]="appearance()"
      [size]="size()"
      [shape]="shape()"
      href="#"
      target="_blank"
      matExpressiveButton
      >Link</a
    >
    <button [matButton]="appearance()" [size]="size()" [shape]="shape()" matExpressiveButton>
      @if (iconPosition() === 'start') {
        <mat-icon>star</mat-icon>
      } @else {
        <mat-icon iconPositionEnd>star</mat-icon>
      }
      With Icon
    </button>
  </div>
</section>
