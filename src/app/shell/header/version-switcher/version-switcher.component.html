@if (versions().length > 0 || true) {
  <button
    mat-button
    [matMenuTriggerFor]="versionMenu"
    class="version-button"
    aria-label="Select documentation version"
  >
    <span class="version-label">{{ activeVersionLabel() }}</span>
    <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
  </button>

  <mat-menu #versionMenu="matMenu" xPosition="before">
    <button
      mat-menu-item
      (click)="selectVersion(null)"
      [class.active-version]="activeVersion() === null"
    >
      <span>Latest</span>
      @if (activeVersion() === null) {
        <mat-icon class="check-icon">check</mat-icon>
      }
    </button>

    @for (v of versions(); track v) {
      <button
        mat-menu-item
        (click)="selectVersion(v)"
        [class.active-version]="activeVersion() === v"
      >
        <span>{{ v }}</span>
        @if (activeVersion() === v) {
          <mat-icon class="check-icon">check</mat-icon>
        }
      </button>
    }
  </mat-menu>
}
