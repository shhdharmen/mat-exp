name: Feature request
description: Suggest a new component, directive, or capability for Mat Expressive
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please search [existing issues](https://github.com/Angular-Material-Dev/mat-exp/issues) first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions, workarounds, or features you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links to similar implementations (e.g. in Material Design 3 Expressive), or other context.
