<h4 class="mat-font-title-lg">Basic Usage</h4>
<section>
  <mat-expressive-button-group
    [size]="size()"
    [variant]="variant()"
    [shape]="shape()"
    [appearance]="appearance()"
    [disabled]="disabled()"
    [selection]="selection()"
    (change)="onChange($event)"
  >
    <button matIconButton matExpressiveIconButton>
      <mat-icon>delete</mat-icon>
    </button>
    <button matButton matExpressiveButton>Label</button>
    <button matButton matExpressiveButton>
      <mat-icon>edit</mat-icon>
      Label
    </button>
    <button matIconButton matExpressiveIconButton>
      <mat-icon>favorite</mat-icon>
    </button>
  </mat-expressive-button-group>
</section>
<h4 class="mat-font-title-lg">Reative Form Usage</h4>
<section>
  <mat-expressive-button-group
    [size]="size()"
    [variant]="variant()"
    [shape]="shape()"
    [appearance]="appearance()"
    [selection]="selection()"
    [formControl]="myControl"
    (change)="onChange($event)"
  >
    <button matIconButton matExpressiveIconButton value="delete">
      <mat-icon>delete</mat-icon>
    </button>
    <button matButton matExpressiveButton value="label">Label</button>
    <button matButton matExpressiveButton value="edit">
      <mat-icon>edit</mat-icon>
      Label
    </button>
    <button matIconButton matExpressiveIconButton value="favorite">
      <mat-icon>favorite</mat-icon>
    </button>
  </mat-expressive-button-group>
</section>
<h5 class="mat-font-title-sm">Form Value</h5>
<section>
  <pre>
    <code>{{ myControl.value }}</code>
  </pre>
</section>
<h4 class="mat-font-title-lg">Template Driven Form Usage</h4>
<section>
  <mat-expressive-button-group
    [size]="size()"
    [variant]="variant()"
    [shape]="shape()"
    [appearance]="appearance()"
    [disabled]="disabled()"
    [selection]="selection()"
    [(ngModel)]="myModel"
    (change)="onChange($event)"
  >
    <button matIconButton matExpressiveIconButton value="delete">
      <mat-icon>delete</mat-icon>
    </button>
    <button matButton matExpressiveButton value="label">Label</button>
    <button matButton matExpressiveButton value="edit">
      <mat-icon>edit</mat-icon>
      Label
    </button>
    <button matIconButton matExpressiveIconButton value="favorite">
      <mat-icon>favorite</mat-icon>
    </button>
  </mat-expressive-button-group>
</section>
<h5 class="mat-font-title-sm">Form Value</h5>
<section>
  <pre>
    <code>{{ myModel() }}</code>
  </pre>
</section>
