<button mat-icon-button mat-dialog-close class="close-button" aria-label="Close dialog">
  <mat-icon>close</mat-icon>
</button>

<h2 mat-dialog-title class="text-3xl sm:text-4xl font-bold px-8 pt-4">Community</h2>

<mat-dialog-content class="px-6 pb-6">
  <p class="text-on-surface-variant mb-4">
    Report issues, suggest enhancements and features, or get help on GitHub.
  </p>
  <a
    [href]="githubRepoUrl"
    target="_blank"
    rel="noopener noreferrer"
    mat-icon-button
    class="social-icon"
    aria-label="Angular Material Dev on GitHub"
  >
    <mat-icon svgIcon="brand-github" />
  </a>

  <hr class="border-outline-variant my-6" />

  <p class="text-on-surface-variant mb-4">Stay up to date on social media.</p>
  <div class="flex gap-3">
    <a
      href="https://x.com/ngMaterialDev"
      target="_blank"
      rel="noopener noreferrer"
      mat-icon-button
      class="social-icon"
      aria-label="Angular Material Dev on X"
    >
      <mat-icon svgIcon="brand-x" />
    </a>
    <a
      href="https://www.linkedin.com/company/angular-material-dev/"
      target="_blank"
      rel="noopener noreferrer"
      mat-icon-button
      class="social-icon"
      aria-label="Angular Material Dev on LinkedIn"
    >
      <mat-icon svgIcon="brand-linkedin" />
    </a>
  </div>
</mat-dialog-content>
