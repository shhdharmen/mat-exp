name: Version Snapshot

on:
  release:
    types: [published]

jobs:
  version-snapshot:
    # Only run for major version tags (v1.0.0, v2.0.0, etc.) — skip minor/patch
    if: startsWith(github.ref_name, 'v') && endsWith(github.ref_name, '.0.0')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Derive version identifiers
        id: vars
        run: |
          TAG="${{ github.ref_name }}"        # e.g. v2.0.0
          MAJOR="${TAG%%.*}"                   # e.g. v2
          MAJOR="${MAJOR#v}"                   # e.g. 2
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "identifier=v${MAJOR}" >> "$GITHUB_OUTPUT"   # v2
          echo "branch=${MAJOR}.x.x" >> "$GITHUB_OUTPUT"    # 2.x.x

      - name: Cut N.x.x branch from release tag commit
        run: |
          git checkout -b "${{ steps.vars.outputs.branch }}" "${{ github.ref_name }}"

      - name: Set VERSION in environment.prod.ts on N.x.x branch
        run: |
          IDENTIFIER="${{ steps.vars.outputs.identifier }}"
          sed -i "s/version: ''/version: '${IDENTIFIER}'/" src/environments/environment.prod.ts
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add src/environments/environment.prod.ts
          git commit -m "chore(release): set version to ${IDENTIFIER} on ${{ steps.vars.outputs.branch }}"

      - name: Push N.x.x branch
        run: |
          git push origin "${{ steps.vars.outputs.branch }}"

      - name: Update versions.json on main
        run: |
          git checkout main
          git pull origin main
          IDENTIFIER="${{ steps.vars.outputs.identifier }}"
          node -e "
            const fs = require('fs');
            const path = 'public/versions.json';
            const versions = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (!versions.includes('${IDENTIFIER}')) {
              versions.push('${IDENTIFIER}');
              fs.writeFileSync(path, JSON.stringify(versions, null, 2) + '\n');
            }
          "
          git add public/versions.json
          git commit -m "chore(release): add ${IDENTIFIER} to versions.json"
          git push origin main
