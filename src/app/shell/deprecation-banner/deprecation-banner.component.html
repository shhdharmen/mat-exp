@if (version) {
  <div
    class="w-full bg-amber-50 border-b border-amber-200 px-4 py-2 flex items-center justify-center gap-2 text-sm text-amber-900"
    role="alert"
  >
    <span>
      You're viewing docs for <strong>{{ version }}</strong>. For the latest,
      visit the current docs.
    </span>
    <a
      [href]="latestDocsUrl"
      class="inline-flex items-center gap-1 font-medium underline underline-offset-2 hover:text-amber-700 transition-colors"
      rel="noopener noreferrer"
    >
      View latest docs &rarr;
    </a>
  </div>
}
