<footer class="pt-10 pb-6 px-4 sm:px-6">
  <div class="max-w-7xl mx-auto">
    <div class="grid grid-cols-2 gap-8 mb-8">
      @for (col of columns; track col.heading) {
        <div>
          <p class="text-sm font-semibold text-on-surface mb-3">{{ col.heading }}</p>
          <ul class="space-y-2 text-sm text-on-surface-variant">
            @for (link of col.links; track link.label) {
              <li>
                @if (link.routerLink) {
                  <a
                    [routerLink]="link.routerLink"
                    class="hover:text-on-surface transition-colors no-underline"
                    >{{ link.label }}</a
                  >
                } @else {
                  <a
                    [href]="link.href"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="hover:text-on-surface transition-colors no-underline"
                    >{{ link.label }}</a
                  >
                }
              </li>
            }
          </ul>
        </div>
      }
    </div>
    <div class="pt-6 text-xs text-on-surface-variant text-center">
      &copy; {{ currentYear }} Angular Material Dev. Released under the MIT License.
    </div>
  </div>
</footer>
