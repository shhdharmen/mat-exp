<ng-doc-root>
  <ng-doc-navbar>
    <h3 style="margin: 0" ngDocNavbarLeft>Mat Expressive</h3>
    <div class="ng-doc-header-controls" ngDocNavbarRight>
      <ng-doc-theme-toggle></ng-doc-theme-toggle>
      <a
        href="https://github.com/Angular-Material-Dev/mat-expressive"
        ng-doc-button-icon
        ngDocTooltip="Repository on GitHub"
        size="large"
        target="_blank"
      >
        <ng-doc-icon [size]="24" customIcon="github"></ng-doc-icon>
      </a>
    </div>
  </ng-doc-navbar>
  <ng-doc-sidebar></ng-doc-sidebar>
  <router-outlet></router-outlet>
</ng-doc-root>
